name: Build and Deploy PenPot MCP Docker

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Clone source repository
      run: |
        git clone https://github.com/penpot/penpot-mcp.git penpot-mcp-source
        rsync -av --exclude='.git' penpot-mcp-source/ ./
        rm -rf penpot-mcp-source

    - name: Test Docker build
      run: |
        docker build -t test-image .

    - name: Test container startup
      run: |
        docker run --rm -d --name test-container \
          -e PENPOT_USERNAME=test \
          -e PENPOT_PASSWORD=test \
          -e PENPOT_API_URL=https://design.penpot.app/api \
          -p 5000:5000 \
          test-image
        sleep 30
        # Test if container is running
        docker ps | grep test-container
        docker stop test-container

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Clone source repository
      run: |
        git clone https://github.com/penpot/penpot-mcp.git penpot-mcp-source
        rsync -av --exclude='.git' penpot-mcp-source/ ./
        rm -rf penpot-mcp-source

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Github Packages
      if: github.event_name != 'pull_request'
      uses: docker/login-action@v4
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: |
          ghcr.io/pigri/penpot-mcp
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy-docs:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs
        enable_jekyll: true
