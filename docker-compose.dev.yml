version: '3.8'

# Development override for docker-compose.yml
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  penpot-mcp:
    environment:
      - PENPOT_MCP_LOG_LEVEL=debug
    volumes:
      - ./penpot-mcp-source:/app/penpot-mcp-source
      - /app/penpot-mcp-source/node_modules
      - /app/penpot-mcp-source/common/node_modules
      - /app/penpot-mcp-source/mcp-server/node_modules
      - /app/penpot-mcp-source/penpot-plugin/node_modules
      - dev_logs:/app/penpot-mcp-source/mcp-server/logs
    ports:
      - "4400:4400"
      - "4401:4401"
      - "4402:4402"
      - "4403:4403"
    command: ["sh", "-lc", "npm install && npm run install:all && npm run build:all && npm run start:all"]
    restart: "no"
    stdin_open: true
    tty: true
    healthcheck:
      interval: 10s
      timeout: 5s
      retries: 3

  # Optional: Add a development database if needed
  postgres:
    image: postgres:15-alpine
    container_name: penpot-mcp-postgres-dev
    environment:
      - POSTGRES_DB=penpot_mcp_dev
      - POSTGRES_USER=penpot_dev
      - POSTGRES_PASSWORD=dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - penpot-network

  # Optional: Add Adminer for database management
  adminer:
    image: adminer:latest
    container_name: penpot-mcp-adminer
    ports:
      - "8080:8080"
    networks:
      - penpot-network
    depends_on:
      - postgres

  # Optional: Add Prometheus for metrics (development)
  prometheus:
    image: prom/prometheus:latest
    container_name: penpot-mcp-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - penpot-network
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'

volumes:
  dev_logs:
    driver: local
  postgres_dev_data:
    driver: local

networks:
  penpot-network:
    driver: bridge
