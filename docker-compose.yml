version: '3.8'

services:
  penpot-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: penpot-mcp:latest
    container_name: penpot-mcp-server
    restart: unless-stopped
    ports:
      - "4400:4400"
      - "4401:4401"
      - "4402:4402"
      - "4403:4403"
    environment:
      - PENPOT_MCP_SERVER_LISTEN_ADDRESS=${PENPOT_MCP_SERVER_LISTEN_ADDRESS:-0.0.0.0}
      - PENPOT_MCP_PLUGIN_SERVER_LISTEN_ADDRESS=${PENPOT_MCP_PLUGIN_SERVER_LISTEN_ADDRESS:-0.0.0.0}
      - PENPOT_MCP_SERVER_ADDRESS=${PENPOT_MCP_SERVER_ADDRESS:-localhost}
      - PENPOT_MCP_SERVER_PORT=${PENPOT_MCP_SERVER_PORT:-4401}
      - PENPOT_MCP_WEBSOCKET_PORT=${PENPOT_MCP_WEBSOCKET_PORT:-4402}
      - PENPOT_MCP_REPL_PORT=${PENPOT_MCP_REPL_PORT:-4403}
      - PENPOT_MCP_REMOTE_MODE=${PENPOT_MCP_REMOTE_MODE:-false}
      - PENPOT_MCP_LOG_LEVEL=${PENPOT_MCP_LOG_LEVEL:-info}
    env_file:
      - .env
    volumes:
      - penpot_logs:/app/penpot-mcp-source/mcp-server/logs
    networks:
      - penpot-network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4401/mcp').then((res) => process.exit(res.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  penpot_logs:
    driver: local

networks:
  penpot-network:
    driver: bridge
